<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    
    <!-- Inner Shadow for Head -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Inner Decorative Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  
  <!-- === User Icon (Head and Shoulders) === -->
  
  <!-- Head -->
  <circle cx="50" cy="35" r="14" fill="white" opacity="0.95"/>
  
  <!-- Head inner detail (subtle highlight) -->
  <circle cx="50" cy="35" r="12" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
  
  <!-- Eyes -->
  <circle cx="44" cy="33" r="2" fill="#1a73e8"/>
  <circle cx="56" cy="33" r="2" fill="#1a73e8"/>
  
  <!-- Eye highlights -->
  <circle cx="44.5" cy="32.5" r="0.7" fill="white"/>
  <circle cx="56.5" cy="32.5" r="0.7" fill="white"/>
  
  <!-- Smile -->
  <path d="M45 39 Q50 44 55 39" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Body / Shoulders -->
  <path d="M50 52 
           C 38 52, 28 57, 24 64 
           L 24 68 
           L 76 68 
           L 76 64 
           C 72 57, 62 52, 50 52 Z" 
        fill="white" opacity="0.95"/>
  
  <!-- Neck detail -->
  <rect x="46" y="46" width="8" height="8" rx="2" fill="white" opacity="0.7"/>
  
  <!-- Collar detail -->
  <path d="M44 54 L50 58 L56 54" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Subtle highlight on shoulder -->
  <path d="M30 63 C 35 60, 45 58, 50 58" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Decorative ring around avatar -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Small decorative dots -->
  <circle cx="50" cy="8" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="85" cy="30" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="15" cy="30" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="50" cy="92" r="1.5" fill="rgba(255,255,255,0.4)"/>
</svg>